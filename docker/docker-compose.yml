services:
  login:
    build: ./login
    container_name: login
    stdin_open: true 
    tty: true
    ports:
      - "3000:3000"
    networks:
      scraper_net:
        ipv4_address: 172.20.0.10

  scraper:
    build: ./scraper
    container_name: scraper
    restart: unless-stopped
    networks:
      scraper_net:
        ipv4_address: 172.20.0.20
    volumes:
      - ./data:/data

networks:
  scraper_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
